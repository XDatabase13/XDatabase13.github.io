<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数理投資情報部 — 投資家が知りたい数理・ファンダメンタルズ指標を、毎朝更新</title>
<meta name="description" content="投資家が知りたい数理・ファンダメンタルズ指標を毎朝更新。理論株価・NAV分析・健康管理など、数理的アプローチで選んだデータをまとめるハブ。">
<meta name="google-site-verification" content="I2iPjYCNIAccsTmjaOFZey02YwSffiBtFpO1Zxjr39s" />
<meta name="google-site-verification" content="xMT4M7Cet-3rfVpR7EdOJ8EA1W26pKCeOGtOfDSB_l4" />
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3360695384486983"
     crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0f13;
    --panel:#16181f;
    --ink:#e8e9ec;
    --muted:#8b8f9a;
    --line:#262932;
    --accent:#4fd1c5;
    --accent2:#f6c454;
    --mono:'JetBrains Mono',monospace;
    --sans:'Zen Kaku Gothic New',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(79,209,197,.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(246,196,84,.05), transparent 40%);
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 24px;}

  header{padding:80px 0 48px;border-bottom:1px solid var(--line);}
  .eyebrow{
    font-family:var(--mono);
    font-size:.72rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:18px;
  }
  h1{
    font-size:clamp(2.2rem,6vw,3.8rem);
    font-weight:900;
    letter-spacing:-.02em;
    line-height:1.08;
  }
  h1 .dim{color:var(--muted);font-weight:400;}
  .lead{
    margin-top:22px;
    max-width:560px;
    color:var(--muted);
    font-size:1.02rem;
  }
  .count{
    font-family:var(--mono);
    font-size:.78rem;
    color:var(--muted);
    margin-top:28px;
  }
  .count b{color:var(--accent2);}

  main{padding:56px 0 40px;}
  .grid{display:grid;gap:18px;}
  @media(min-width:680px){.grid{grid-template-columns:1fr 1fr;}}

  .card{
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 26px;
    position:relative;
    overflow:hidden;
    transition:border-color .25s, transform .25s;
  }
  .card::after{
    content:"→";
    position:absolute;
    top:24px;right:24px;
    font-family:var(--mono);
    color:var(--muted);
    transition:transform .25s, color .25s;
  }
  .card:hover{border-color:var(--accent);transform:translateY(-3px);}
  .card:hover::after{transform:translate(4px,-2px);color:var(--accent);}
  .card .tag{
    font-family:var(--mono);
    font-size:.68rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--accent);
    display:block;
    margin-bottom:14px;
  }
  .card h2{font-size:1.5rem;font-weight:700;letter-spacing:-.01em;}
  .card .sub{color:var(--muted);font-size:.92rem;margin-top:8px;}
  .card .meta{
    font-family:var(--mono);
    font-size:.72rem;
    color:var(--muted);
    margin-top:20px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }

  footer{
    border-top:1px solid var(--line);
    padding:32px 0 60px;
    color:var(--muted);
    font-family:var(--mono);
    font-size:.74rem;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .footer-disclaimer{
    color:var(--muted);
    font-size:.68rem;
    line-height:1.6;
    opacity:.7;
  }
  .footer-bottom{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    margin-top:8px;
  }

  .reveal{opacity:0;transform:translateY(14px);animation:rise .6s forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow reveal" style="animation-delay:.05s">Mathematical Investment Hub</div>
      <h1 class="reveal" style="animation-delay:.12s">数理投資情報部<span class="dim">.</span></h1>
      <p class="lead reveal" style="animation-delay:.2s">
        投資家が知りたい数理・ファンダメンタルズ指標を、毎朝更新。<br>
        データで見る相場と、投資家の身体管理。
      </p>
      <p class="count reveal" style="animation-delay:.28s">
        現在 <b id="svc-count">0</b> サービス稼働中
      </p>
    </header>

    <main>
      <div class="grid" id="services"></div>
    </main>

    <footer>
      <p class="footer-disclaimer">
        当サイトの情報は投資助言ではありません。掲載データは情報提供のみを目的としており、投資判断はご自身の責任でお願いします。
      </p>
      <div class="footer-bottom">
        <span>数理投資情報部 — xdbdb.com</span>
        <span id="year"></span>
      </div>
    </footer>
  </div>

<script>
  // ── コンテンツ一覧（新サービスはここに1件足すだけ） ───────────────
  const SERVICES = [
    {
      tag: "Investment",
      name: "SBG 理論株価モニター",
      sub: "ソフトバンクGのNAVに基づく理論株価とディスカウント率を毎朝更新。保有資産の時価からNAVを算出。",
      meta: "auto-update · every morning",
      url: "/sbg-nav/"
    },
    {
      tag: "Investment",
      name: "暗号通貨トレジャリー企業 mNAVモニター",
      sub: "BTC保有企業（MSTR・メタプラネット）のmNAVプレミアムを毎朝自動計算。日米比較と計算の全透明性。",
      meta: "auto-update · every morning",
      url: "/crypto-nav/"
    },
    {
      tag: "Health",
      name: "筋トレメニュー検索",
      sub: "投資家のメンタル・健康管理。部位別に探せる203種の筋トレデータベース。",
      meta: "203+ exercises",
      url: "/kintore/"
    }
  ];
  // ────────────────────────────────────────────────────────────

  const grid = document.getElementById('services');
  SERVICES.forEach((s, i) => {
    const a = document.createElement('a');
    a.className = 'card reveal';
    a.href = s.url;
    a.style.animationDelay = (0.34 + i * 0.08) + 's';
    a.innerHTML = `
      <span class="tag">${s.tag}</span>
      <h2>${s.name}</h2>
      <p class="sub">${s.sub}</p>
      <p class="meta">${s.meta}</p>`;
    grid.appendChild(a);
  });
  document.getElementById('svc-count').textContent = SERVICES.length;
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
