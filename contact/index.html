<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — xdbdb.com</title>
<meta name="description" content="数理投資情報部（xdbdb.com）へのお問い合わせはこちらから。ご質問・ご要望をお寄せください。">
<link rel="canonical" href="https://xdbdb.com/contact/">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3360695384486983" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #0e0f13;
    --panel: #16181f;
    --ink:   #e8e9ec;
    --muted: #8b8f9a;
    --line:  #262932;
    --accent:#4fd1c5;
    --mono:  'JetBrains Mono', monospace;
    --sans:  'Zen Kaku Gothic New', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    background-image: radial-gradient(circle at 15% 10%, rgba(79,209,197,.05), transparent 40%);
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 24px 80px; }
  .back-link {
    display: block;
    padding: 28px 0 0;
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    text-decoration: none;
    transition: color .2s;
  }
  .back-link:hover { color: var(--accent); }
  .page-header {
    padding: 22px 0 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 36px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: .68rem;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 900; letter-spacing: -.02em; line-height: 1.2; }
  .page-content p { font-size: .92rem; color: var(--muted); margin-bottom: 14px; line-height: 1.85; }
  .page-content a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .page-content a:hover { text-decoration: underline; }
  .notice {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: .86rem;
    color: var(--muted);
  }
  .form-wrap {
    margin: 24px 0 8px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .form-wrap iframe {
    display: block;
    width: 100%;
    border: none;
    background: #fff;
  }
  .form-fallback {
    margin-top: 10px;
    font-size: .82rem;
  }
  footer {
    margin-top: 52px;
    padding: 22px 0 60px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
  }
  .footer-nav { display: flex; flex-wrap: wrap; gap: 6px 20px; margin-bottom: 12px; }
  .footer-nav a { color: var(--muted); text-decoration: none; transition: color .2s; }
  .footer-nav a:hover { color: var(--accent); }
  .footer-copy { opacity: .6; font-size: .66rem; }
</style>
</head>
<body>
<div class="wrap">
  <a href="https://xdbdb.com/" class="back-link">← 数理投資情報部 トップへ</a>

  <div class="page-header">
    <p class="eyebrow">xdbdb.com</p>
    <h1>お問い合わせ</h1>
  </div>

  <div class="page-content">
    <p>当サイトに関するご質問・ご要望・お気づきの点などがありましたら、以下のフォームよりお寄せください。内容を確認のうえ、必要に応じて対応いたします。</p>
    <div class="notice">
      個別の投資判断に関するご相談や、特定銘柄に関するお問い合わせにはお答えできかねますので、あらかじめご了承ください。
    </div>

    <div class="form-wrap">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSd-GkBkD5ZKhh9MFyl4s5hrXOQ2QACE-UhM3WOjqeXqsDHEVQ/viewform?embedded=true"
        height="620"
        title="お問い合わせフォーム">読み込んでいます…</iframe>
    </div>
    <p class="form-fallback">フォームが表示されない場合は<a href="https://docs.google.com/forms/d/e/1FAIpQLSd-GkBkD5ZKhh9MFyl4s5hrXOQ2QACE-UhM3WOjqeXqsDHEVQ/viewform" target="_blank" rel="noopener">こちら</a>からアクセスしてください。</p>
  </div>

  <footer>
    <nav class="footer-nav">
      <a href="https://xdbdb.com/">トップ</a>
      <a href="https://xdbdb.com/privacy/">プライバシーポリシー</a>
      <a href="https://xdbdb.com/about/">運営者情報</a>
    </nav>
    <p class="footer-copy">数理投資情報部 — xdbdb.com</p>
  </footer>
</div>
</body>
</html>
