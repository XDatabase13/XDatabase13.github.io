name: Update Hub Data

# cron-job.org から JST 05:40 に workflow_dispatch をトリガーする(内蔵スケジュールなし)
on:
  workflow_dispatch:

concurrency:
  group: update-hub-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run build_hub.py
        run: python build_hub.py

      - name: Commit and push if hub_data.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hub_data.json index.html
          if git diff --staged --quiet; then
            echo "hub_data.json に変更なし。コミットをスキップします。"
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            git commit -m "auto: update hub_data.json ${TIMESTAMP}"
            git pull --rebase origin main
            git push
            echo "hub_data.json をコミット・プッシュしました。"
          fi
